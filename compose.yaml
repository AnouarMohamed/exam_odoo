services:
  db:
    image: postgres:15
    container_name: travel_agency_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - travel_agency_db_data:/var/lib/postgresql/data

  odoo:
    image: odoo:17.0
    container_name: travel_agency_odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo_data:/var/lib/odoo
      - ./travel_agency_management:/mnt/extra-addons/travel_agency_management
    command: >
      odoo
      --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
      --db_host=db
      --db_user=odoo
      --db_password=odoo

volumes:
  travel_agency_db_data:
  odoo_data:
