name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          pip install ruff

      - name: General Linting (Ruff)
        run: ruff check .

  test:
    name: Unit Tests (Odoo 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Network
        run: docker network create odoo-net

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name db \
            --network odoo-net \
            -e POSTGRES_USER=odoo \
            -e POSTGRES_PASSWORD=odoo \
            -e POSTGRES_DB=postgres \
            postgres:15

      - name: Pull Odoo Image
        run: docker pull odoo:17.0

      - name: Wait for PostgreSQL
        run: |
          until docker exec db pg_isready; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run Odoo Tests
        run: |
          docker run --rm --init \
            --network odoo-net \
            -v $(pwd)/module_odoo:/mnt/extra-addons \
            -e HOST=db \
            -e USER=odoo \
            -e PASSWORD=odoo \
            odoo:17.0 \
            -- \
            -d test_db \
            -i travel_agency_management \
            --test-enable \
            --stop-after-init \
            --log-level=info \
            --test-tags /travel_agency_management
